name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
      new_release_version:   ${{ steps.semantic.outputs.new_release_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install semantic-release
        run: npm install --save-dev semantic-release @semantic-release/changelog @semantic-release/git @semantic-release/github conventional-changelog-conventionalcommits

      - name: Run semantic-release
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

      - name: Update README version badge via GitHub API
        if: ${{ steps.semantic.outputs.new_release_published == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.semantic.outputs.new_release_version }}
        run: |
          # Get version
          VERSION=${VERSION:-$(node -p "require('./package.json').version")}
          echo "📦 Updating README badge to v$VERSION"

          # Get current README content
          CURRENT=$(gh api repos/${{ github.repository }}/contents/README.md --jq '.content' | base64 -d)

          # Update version
          UPDATED=$(echo "$CURRENT" | sed "s/Version-[0-9]\+\.[0-9]\+\.[0-9]\+/Version-$VERSION/")

          # Check if changed
          if [ "$CURRENT" != "$UPDATED" ]; then
            echo "✓ README needs update"

            # Get SHA for update
            SHA=$(gh api repos/${{ github.repository }}/contents/README.md --jq '.sha')

            # Update file via API
            gh api repos/${{ github.repository }}/contents/README.md \
              --input - \
              -F message="chore(release): update README version badge to v$VERSION [skip ci]" \
              -F content="$(echo "$UPDATED" | base64 -w0)" \
              -F sha="$SHA" \
              << EOF
            {}
            EOF

            echo "✓ README updated via GitHub API"
          else
            echo "✓ README already up to date"
          fi

  # Quand une release est publiée → rebuild Docker avec le tag de version
  docker-release:
    needs: release
    if: ${{ needs.release.outputs.new_release_published == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (versioned + latest)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/idrinkx/plex-portal:latest
            ghcr.io/idrinkx/plex-portal:v${{ needs.release.outputs.new_release_version }}
