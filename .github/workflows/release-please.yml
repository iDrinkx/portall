name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
      new_release_version:   ${{ steps.semantic.outputs.new_release_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install semantic-release
        run: npm install --save-dev semantic-release @semantic-release/changelog @semantic-release/git @semantic-release/github conventional-changelog-conventionalcommits

      - name: Run semantic-release
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

  # Quand une release est publiée → rebuild Docker avec le tag de version
  docker-release:
    needs: release
    if: ${{ needs.release.outputs.new_release_published == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (versioned + latest)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/idrinkx/plex-portal:latest
            ghcr.io/idrinkx/plex-portal:v${{ needs.release.outputs.new_release_version }}

  # Quand une release est publiée → mettre à jour le repo public (docs + changelog)
  update-docs-repo:
    needs: release
    if: ${{ needs.release.outputs.new_release_published == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout private repo (for CHANGELOG.md)
        uses: actions/checkout@v4
        with:
          path: private-repo

      - name: Checkout public docs repo
        uses: actions/checkout@v4
        with:
          repository: idrinkx/plex-portal-docker
          token: ${{ secrets.DOCS_REPO_TOKEN }}
          path: public-repo

      - name: Update public repo with version and changelog
        run: |
          VERSION="${{ needs.release.outputs.new_release_version }}"

          # Copier CHANGELOG.md depuis le repo privé vers le repo public
          cp private-repo/CHANGELOG.md public-repo/CHANGELOG.md

          # Mettre à jour la version dans le README du repo public
          cd public-repo

          # Remplacer la ligne de version existante ou l'ajouter en haut
          if grep -q "^**Version:" README.md; then
            sed -i "s/^\*\*Version:.*/**Version: v${VERSION}/" README.md
          else
            sed -i "1s/^/**Version: v${VERSION}**\n\n/" README.md
          fi

      - name: Commit and push to public repo
        run: |
          cd public-repo
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md CHANGELOG.md
          git commit -m "chore: sync version v${{ needs.release.outputs.new_release_version }} and changelog from private repo"
          git push
