name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
      new_release_version:   ${{ steps.semantic.outputs.new_release_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install semantic-release
        run: npm install --save-dev semantic-release @semantic-release/changelog @semantic-release/git @semantic-release/github conventional-changelog-conventionalcommits

      - name: Run semantic-release
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

  # Quand une release est publiée → rebuild Docker avec le tag de version
  docker-release:
    needs: release
    if: ${{ needs.release.outputs.new_release_published == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (versioned + latest)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/idrinkx/plex-portal:latest
            ghcr.io/idrinkx/plex-portal:v${{ needs.release.outputs.new_release_version }}

  # Quand une release est publiée → mettre à jour le README du repo public
  update-docs-repo:
    needs: release
    if: ${{ needs.release.outputs.new_release_published == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout public docs repo
        uses: actions/checkout@v4
        with:
          repository: idrinkx/plex-portal-docker
          token: ${{ secrets.DOCS_REPO_TOKEN }}

      - name: Update README with version badge
        run: |
          VERSION="${{ needs.release.outputs.new_release_version }}"
          # Ajouter ou remplacer le badge de version en haut du README
          sed -i "1s/^/[![Version Badge](https:\/\/img.shields.io\/badge\/Latest%20Version-v${VERSION}-34d399)]()\n\n/" README.md

      - name: Commit and push to public repo
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add README.md
          git commit -m "chore: update version to v${{ needs.release.outputs.new_release_version }}"
          git push
